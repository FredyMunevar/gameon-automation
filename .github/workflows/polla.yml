# Envía mis picks a AppGameOn en la nube (sin mi Mac), todas las mañanas.
#
# Secrets del repo (Settings > Secrets and variables > Actions > New repository secret):
#   FIREBASE_API_KEY   la google_api_key del APK (no es secreta, pero va por secret)
#   GAMEON_EMAIL       mi correo de GameOn
#   GAMEON_PASSWORD    mi contraseña  (SECRETO)
#   GAMEON_GROUP_ID    32534  (la polla del Mundial)
#   --- notificación por correo ---
#   MAIL_SERVER        host SMTP (p.ej. smtp.gmail.com)
#   MAIL_PORT          puerto SMTP (465 SSL)
#   MAIL_USERNAME      usuario SMTP (mi correo)
#   MAIL_PASSWORD      app password del correo (SECRETO)
#   MAIL_TO            destinatario del aviso
#
# Qué hace cada corrida (modelo vivo): login -> lee el calendario con resultados ->
# actualiza el Elo bayesiano ACUMULADO con todos los partidos FT -> re-predice TODOS
# los partidos NS (Poisson-Elo + Dixon-Coles) -> los envía/edita.
# Alcance: solo partidos NO empezados (state NS) y con > 5 min para el saque.
# Idempotente: re-correr sobrescribe con el pick más reciente. Por eso es matutina.
#
# Hora: el cron de Actions es UTC. 13:00 UTC = 08:00 Bogotá (UTC-5).

name: Enviar picks polla

permissions:
  contents: write          # para commitear el historial del tablero

on:
  # El disparo diario lo hace Vercel Cron (más fiable que el schedule de Actions):
  # /api/cron del tablero llama a este workflow vía workflow_dispatch. El cron de
  # GitHub se quitó porque se retrasaba/omitía. Ver dashboard/app/api/cron/route.js.
  workflow_dispatch: {}          # disparable por Vercel Cron y a mano desde Actions

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests

      - name: Enviar picks pendientes (solo partidos sin empezar)
        id: run
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          GAMEON_EMAIL:     ${{ secrets.GAMEON_EMAIL }}
          GAMEON_PASSWORD:  ${{ secrets.GAMEON_PASSWORD }}
          GAMEON_GROUP_ID:  ${{ secrets.GAMEON_GROUP_ID }}
        run: |
          set -o pipefail
          python3 submit_gameon.py --go 2>&1 | tee run.log

      # Si el script falló y no alcanzó a generar el resumen HTML, lo armamos del log.
      - name: Asegurar resumen HTML
        if: always()
        run: |
          if [ ! -f summary.html ]; then
            {
              echo '<div style="font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;">'
              echo '<h2 style="color:#b91c1c;">⚠️ La corrida no terminó bien — log completo:</h2>'
              echo '<pre style="background:#0f172a;color:#e2e8f0;padding:14px;border-radius:8px;white-space:pre-wrap;font-size:13px;">'
              cat run.log 2>/dev/null || echo "(sin log)"
              echo '</pre></div>'
            } > summary.html
          fi

      - name: Guardar datos del tablero (alimenta Vercel)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/model.json
          git diff --staged --quiet || git commit -m "tablero: actualización $(date -u +%FT%TZ)"
          git push origin HEAD:main

      - name: Notificar por correo (siempre)
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port:    ${{ secrets.MAIL_PORT }}
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          from:           Polla GameOn <${{ secrets.MAIL_USERNAME }}>
          to:             ${{ secrets.MAIL_TO }}
          subject:        "Polla GameOn — ${{ job.status == 'success' && '✅ picks enviados' || '⚠️ revisar' }} (${{ github.run_id }})"
          html_body:      file://summary.html
          body:           file://run.log
